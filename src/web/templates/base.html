<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SAFE SCORING Admin{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <!-- Navigation -->
    <nav class="bg-gray-800 border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex items-center">
                        <span class="text-2xl font-bold text-emerald-400">🔐 SAFE</span>
                        <span class="text-2xl font-light text-gray-300 ml-1">SCORING</span>
                    </a>
                    <div class="ml-10 flex items-baseline space-x-4">
                        <a href="/products" class="px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-700">
                            📦 Produits
                        </a>
                        <a href="/norms" class="px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-700">
                            📋 Normes
                        </a>
                        <a href="/products/add" class="px-3 py-2 rounded-md text-sm font-medium bg-emerald-600 text-white hover:bg-emerald-700">
                            + Ajouter Produit
                        </a>
                        <a href="/norms/add" class="px-3 py-2 rounded-md text-sm font-medium bg-blue-600 text-white hover:bg-blue-700">
                            + Ajouter Norme
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Contenu -->
    <main class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 border-t border-gray-700 mt-auto">
        <div class="max-w-7xl mx-auto py-4 px-4 text-center text-gray-400 text-sm">
            SAFE SCORING™ - Administration © 2025
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
