{% extends "base.html" %}

{% block title %}Ajouter un Produit - SAFE SCORING{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold text-white mb-8">📦 Ajouter un Produit</h1>
    
    {% if error %}
    <div class="bg-red-900/50 border border-red-500 text-red-200 px-4 py-3 rounded-lg mb-6">
        {{ error }}
    </div>
    {% endif %}
    
    <form method="POST" class="bg-gray-800 rounded-xl p-6 space-y-6">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <!-- Nom -->
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">
                Nom du produit *
            </label>
            <input type="text" name="name" required
                   class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-emerald-500"
                   placeholder="Ex: Ledger Nano X">
        </div>
        
        <!-- Type -->
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">
                Type de produit *
            </label>
            <select name="type_id" required
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-emerald-500">
                <option value="">-- Sélectionner un type --</option>
                {% for type in types %}
                <option value="{{ type.id }}">{{ type.code }} - {{ type.name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <!-- Marque -->
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">
                Marque
            </label>
            <select name="brand_id"
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-emerald-500">
                <option value="">-- Sélectionner une marque --</option>
                {% for brand in brands %}
                <option value="{{ brand.id }}">{{ brand.name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <!-- Description -->
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">
                Description
            </label>
            <textarea name="description" rows="3"
                      class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-emerald-500"
                      placeholder="Description du produit..."></textarea>
        </div>
        
        <!-- URL -->
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">
                URL officielle
            </label>
            <input type="url" name="url"
                   class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-emerald-500"
                   placeholder="https://...">
        </div>
        
        <!-- Boutons -->
        <div class="flex gap-4 pt-4">
            <button type="submit"
                    class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 px-6 rounded-lg transition-colors">
                ✅ Créer et Évaluer
            </button>
            <a href="/products"
               class="px-6 py-3 bg-gray-700 hover:bg-gray-600 text-gray-300 rounded-lg transition-colors">
                Annuler
            </a>
        </div>
    </form>
    
    <p class="text-gray-500 text-sm mt-4 text-center">
        Après création, vous serez redirigé vers le formulaire d'évaluation.
    </p>
</div>
{% endblock %}
