<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #333;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #00d4aa;
    }

    .title {
      font-size: 14px;
      font-weight: 600;
    }

    .subtitle {
      font-size: 11px;
      color: #888;
    }

    .score-card {
      background: #252540;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .score-card.loading {
      text-align: center;
      color: #888;
    }

    .score-card.not-found {
      text-align: center;
      color: #888;
    }

    .product-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .product-type {
      font-size: 12px;
      color: #888;
      margin-bottom: 12px;
    }

    .score-display {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .score-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
      position: relative;
    }

    .score-circle::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 4px solid currentColor;
      opacity: 0.2;
    }

    .score-circle.good {
      color: #22c55e;
      background: rgba(34, 197, 94, 0.1);
    }

    .score-circle.medium {
      color: #f59e0b;
      background: rgba(245, 158, 11, 0.1);
    }

    .score-circle.bad {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
    }

    .score-details {
      flex: 1;
    }

    .score-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }

    .pillars {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 12px;
    }

    .pillar {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
    }

    .pillar-code {
      font-weight: 600;
    }

    .pillar-score {
      color: #888;
    }

    .cta-button {
      display: block;
      width: 100%;
      padding: 10px;
      background: #00d4aa;
      color: #1a1a2e;
      text-decoration: none;
      border-radius: 8px;
      text-align: center;
      font-weight: 600;
      font-size: 13px;
      margin-top: 12px;
    }

    .cta-button:hover {
      background: #00b894;
    }

    .footer {
      margin-top: 12px;
      text-align: center;
      font-size: 10px;
      color: #666;
    }

    .footer a {
      color: #00d4aa;
      text-decoration: none;
    }

    .warning-badge {
      background: #ef4444;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 8px;
      display: inline-block;
    }

    .safe-badge {
      background: #22c55e;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 8px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🛡️</div>
    <div>
      <div class="title">SafeScoring</div>
      <div class="subtitle">Crypto Security Checker</div>
    </div>
  </div>

  <div id="content">
    <div class="score-card loading">
      <p>Checking current site...</p>
    </div>
  </div>

  <div class="footer">
    Powered by <a href="https://safescoring.io" target="_blank">SafeScoring.io</a>
    <br>916 security norms. 0 opinions. 1 score.
  </div>

  <script src="popup.js"></script>
</body>
</html>
