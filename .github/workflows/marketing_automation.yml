name: Marketing Automation

# This workflow runs ALL marketing tasks automatically
# No server needed - GitHub Actions runs everything on schedule

on:
  schedule:
    # =============================================
    # PLANNING RÉALISTE - PAS DE SPAM
    # =============================================

    # Content monitoring - 2x par jour (matin + soir)
    - cron: '0 8,18 * * *'

    # SEO generation - 1 article par jour à 7h
    - cron: '0 7 * * *'

    # Email sequences - 2x par jour
    - cron: '0 9,15 * * *'

    # Weekly report - Lundi 9h
    - cron: '0 9 * * 1'

    # Social listening - 3x par jour (pas toutes les 15min!)
    - cron: '0 10,14,20 * * *'

    # Backlink outreach - 3x par semaine (Lun, Mer, Ven)
    - cron: '0 10 * * 1,3,5'

    # Reddit - 1x par jour max (évite le spam)
    - cron: '0 16 * * *'

    # Video generation - 2x par semaine (Mardi, Vendredi)
    - cron: '0 8 * * 2,5'

    # Testimonials - 1x par semaine (Jeudi)
    - cron: '0 11 * * 4'

    # Translation - 1x par mois (1er dimanche)
    - cron: '0 4 1-7 * 0'

  workflow_dispatch:
    inputs:
      task:
        description: 'Task to run'
        required: true
        default: 'content'
        type: choice
        options:
          - content
          - seo
          - email
          - report
          - social
          - outreach
          - reddit
          - video
          - testimonials
          - translate
          - all

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
  TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
  TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
  TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}

jobs:
  # ============================================
  # CONTENT MONITORING & GENERATION
  # Runs every 4 hours
  # ============================================
  content-cycle:
    if: github.event.schedule == '0 */4 * * *' || github.event.inputs.task == 'content' || github.event.inputs.task == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run content monitoring
        run: |
          python -c "
          import asyncio
          from src.marketing.auto_marketing import AutoMarketing

          async def main():
              am = AutoMarketing()
              # Check for incidents
              incidents = await am.monitor.check_all_sources()
              print(f'Found {len(incidents)} incidents')

              # Generate content for top incidents
              for incident in incidents[:2]:
                  content = await am.generator.generate_incident_thread(incident)
                  if content:
                      # Save as draft (review before posting)
                      await am.publisher.save_draft(content)
                      print(f'Draft saved: {incident.get(\"title\", \"Unknown\")}')

          asyncio.run(main())
          "

      - name: Upload drafts
        uses: actions/upload-artifact@v4
        with:
          name: content-drafts-${{ github.run_number }}
          path: drafts/
          retention-days: 7

  # ============================================
  # SEO ARTICLE GENERATION
  # Runs daily at 6 AM
  # ============================================
  seo-generation:
    if: github.event.schedule == '0 6 * * *' || github.event.inputs.task == 'seo' || github.event.inputs.task == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate SEO articles
        run: |
          python -c "
          import asyncio
          from src.marketing.seo_generator import SEOArticleGenerator

          async def main():
              generator = SEOArticleGenerator()
              articles = await generator.generate_daily_batch(count=2)
              print(f'Generated {len(articles)} articles')
              for article in articles:
                  print(f'  - {article.get(\"title\", \"Unknown\")}')

          asyncio.run(main())
          "

      - name: Commit generated articles
        run: |
          git config --local user.email "bot@safescoring.io"
          git config --local user.name "SafeScoring Bot"
          git add content/articles/ || true
          git diff --staged --quiet || git commit -m "🤖 Auto-generated SEO articles"
          git push || true

  # ============================================
  # EMAIL SEQUENCE PROCESSING
  # Runs every hour
  # ============================================
  email-processing:
    if: github.event.schedule == '0 * * * *' || github.event.inputs.task == 'email' || github.event.inputs.task == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process email sequences
        run: |
          python -c "
          import asyncio
          from src.marketing.email_sequences import EmailSequenceManager

          async def main():
              manager = EmailSequenceManager()
              sent = await manager.process_pending_emails()
              print(f'Sent {sent} emails')

          asyncio.run(main())
          "

  # ============================================
  # WEEKLY PERFORMANCE REPORT
  # Runs Monday at 9 AM
  # ============================================
  weekly-report:
    if: github.event.schedule == '0 9 * * 1' || github.event.inputs.task == 'report' || github.event.inputs.task == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and send weekly report
        run: |
          python -c "
          import asyncio
          import os
          from datetime import datetime

          async def main():
              # Collect stats from Supabase
              report = f'''
          # SafeScoring Weekly Marketing Report
          Generated: {datetime.now().strftime(\"%Y-%m-%d %H:%M\")}

          ## Platform Stats
          - Check Supabase dashboard for detailed metrics

          ## Automation Status
          - ✅ Content monitoring: Active
          - ✅ SEO generation: Active
          - ✅ Email sequences: Active

          ## Next Steps
          - Review content drafts
          - Approve pending posts
          - Check engagement metrics

          ---
          🤖 Auto-generated by SafeScoring Marketing Bot
              '''

              print(report)

              # In production, send via email
              # await send_email(os.getenv('ADMIN_EMAIL'), 'Weekly Report', report)

          asyncio.run(main())
          "

  # ============================================
  # SOCIAL MEDIA AUTO-POSTING
  # Posts approved drafts
  # ============================================
  auto-posting:
    if: github.event.inputs.task == 'all'
    needs: content-cycle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download drafts
        uses: actions/download-artifact@v4
        with:
          name: content-drafts-${{ github.run_number }}
          path: drafts/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post approved content
        if: env.AUTO_POST == 'true'
        run: |
          python -c "
          import asyncio
          from src.marketing.twitter_publisher import TwitterPublisher
          import json
          from pathlib import Path

          async def main():
              publisher = TwitterPublisher()
              drafts_dir = Path('drafts')

              if not drafts_dir.exists():
                  print('No drafts to post')
                  return

              for draft_file in drafts_dir.glob('*.json'):
                  with open(draft_file) as f:
                      draft = json.load(f)

                  if draft.get('approved', False):
                      await publisher.post_thread(draft['content'])
                      print(f'Posted: {draft_file.name}')
                      draft_file.unlink()  # Delete after posting

          asyncio.run(main())
          "
        env:
          AUTO_POST: ${{ secrets.AUTO_POST }}

  # ============================================
  # SOCIAL LISTENING & AUTO-REPLY
  # Runs every 15 minutes
  # ============================================
  social-listening:
    if: github.event.schedule == '0 10,14,20 * * *' || github.event.inputs.task == 'social' || github.event.inputs.task == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run social listener
        run: |
          python -c "
          import asyncio
          from src.marketing.social_listener import SocialListener

          async def main():
              listener = SocialListener()
              await listener.run_cycle()

          asyncio.run(main())
          "
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          AUTO_REPLY: ${{ secrets.AUTO_REPLY }}

  # ============================================
  # BACKLINK OUTREACH
  # Runs daily at 10 AM
  # ============================================
  backlink-outreach:
    if: github.event.schedule == '0 10 * * 1,3,5' || github.event.inputs.task == 'outreach' || github.event.inputs.task == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backlink outreach
        run: |
          python -c "
          import asyncio
          from src.marketing.backlink_outreach import BacklinkOutreach

          async def main():
              outreach = BacklinkOutreach()
              await outreach.run_daily_outreach(max_emails=5)
              stats = outreach.get_stats()
              print(f'Outreach stats: {stats}')

          asyncio.run(main())
          "
        env:
          SENDER_NAME: ${{ secrets.SENDER_NAME }}

  # ============================================
  # REDDIT ENGAGEMENT
  # Runs every 6 hours
  # ============================================
  reddit-engagement:
    if: github.event.schedule == '0 16 * * *' || github.event.inputs.task == 'reddit' || github.event.inputs.task == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Reddit marketing
        run: |
          python -c "
          import asyncio
          from src.marketing.reddit_automation import RedditMarketing

          async def main():
              reddit = RedditMarketing()
              await reddit.run_daily_cycle()

          asyncio.run(main())
          "
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
          DRY_RUN: 'true'

  # ============================================
  # VIDEO SCRIPT GENERATION
  # Runs daily at 8 AM
  # ============================================
  video-generation:
    if: github.event.schedule == '0 8 * * 2,5' || github.event.inputs.task == 'video' || github.event.inputs.task == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate video scripts
        run: |
          python -c "
          import asyncio
          from src.marketing.video_generator import VideoGenerator

          async def main():
              generator = VideoGenerator()
              videos = await generator.run_daily_generation()
              print(f'Generated {len(videos)} video scripts')

          asyncio.run(main())
          "

      - name: Upload video scripts
        uses: actions/upload-artifact@v4
        with:
          name: video-scripts-${{ github.run_number }}
          path: content/videos/
          retention-days: 30

  # ============================================
  # TESTIMONIAL COLLECTION
  # Runs daily at 11 AM
  # ============================================
  testimonial-collection:
    if: github.event.schedule == '0 11 * * 4' || github.event.inputs.task == 'testimonials' || github.event.inputs.task == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect testimonials
        run: |
          python -c "
          import asyncio
          from src.marketing.testimonial_collector import TestimonialCollector

          async def main():
              collector = TestimonialCollector()
              stats = await collector.run_daily_collection()
              print(f'Testimonial stats: {stats}')

          asyncio.run(main())
          "

  # ============================================
  # CONTENT TRANSLATION
  # Runs weekly on Sunday
  # ============================================
  content-translation:
    if: github.event.schedule == '0 4 1-7 * 0' || github.event.inputs.task == 'translate' || github.event.inputs.task == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Translate content
        run: |
          python -c "
          import asyncio
          from src.marketing.auto_translator import AutoTranslator

          async def main():
              translator = AutoTranslator()
              await translator.translate_website_content()
              print(f'Translation stats: {translator.get_stats()}')

          asyncio.run(main())
          "

      - name: Commit translations
        run: |
          git config --local user.email "bot@safescoring.io"
          git config --local user.name "SafeScoring Bot"
          git add content/translations/ || true
          git diff --staged --quiet || git commit -m "🌍 Auto-translated content"
          git push || true
