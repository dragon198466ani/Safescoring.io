# Competitor Monitor - Automated honeypot detection
# Scans competitor sites every 6 hours for copied SafeScoring data

name: Competitor Monitor

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'

  workflow_dispatch:
    inputs:
      competitor:
        description: 'Specific competitor domain to scan (optional)'
        required: false
        type: string
      check_only:
        description: 'Check configuration without scraping'
        required: false
        type: boolean
        default: false

env:
  PYTHON_VERSION: '3.11'

jobs:
  monitor:
    name: Scan Competitors
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install supabase beautifulsoup4 requests

      - name: Run competitor monitor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.competitor }}" ]; then
            ARGS="$ARGS --competitor ${{ github.event.inputs.competitor }}"
          fi
          if [ "${{ github.event.inputs.check_only }}" == "true" ]; then
            ARGS="$ARGS --check-only"
          fi
          python src/automation/competitor_monitor.py $ARGS

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: competitor-scan-${{ github.run_number }}
          path: |
            *.log
          retention-days: 30

  alert-on-detection:
    name: Alert on Honeypot Detection
    runs-on: ubuntu-latest
    needs: monitor
    if: failure()

    steps:
      - name: Send failure alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=⚠️ Competitor Monitor workflow failed. Check GitHub Actions."
          fi
