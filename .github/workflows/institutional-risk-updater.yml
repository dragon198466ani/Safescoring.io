name: Institutional Risk Data Updater

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Days to look back for news'
        required: false
        default: '7'
      update_assessments:
        description: 'Update country risk assessments'
        required: false
        default: 'true'

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}

jobs:
  update-institutional-risks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install httpx supabase google-generativeai python-dotenv

      - name: Run GDELT Incident Fetcher
        run: |
          python -c "
          import asyncio
          import sys
          sys.path.insert(0, 'src/automation')
          from institutional_risk_updater import fetch_gdelt_incidents, run_full_update

          async def main():
              # Fetch from free GDELT source
              incidents = await fetch_gdelt_incidents(days_back=${{ github.event.inputs.days_back || 7 }})
              print(f'Fetched {len(incidents)} incidents from GDELT')
              return incidents

          asyncio.run(main())
          "

      - name: Run AI Analysis Pipeline
        if: env.GEMINI_API_KEY != ''
        run: |
          python -c "
          import asyncio
          import os
          import sys
          sys.path.insert(0, 'src/automation')

          from institutional_risk_updater import fetch_gdelt_incidents
          from institutional_risk_ai_analyzer import run_ai_analysis_pipeline

          async def main():
              # Fetch incidents
              incidents = await fetch_gdelt_incidents(days_back=${{ github.event.inputs.days_back || 7 }})

              if incidents:
                  # Run AI analysis
                  result = await run_ai_analysis_pipeline(incidents)
                  print(f'Analysis complete: {result}')
              else:
                  print('No incidents to analyze')

          asyncio.run(main())
          "

      - name: Update Country Risk Assessments
        if: github.event.inputs.update_assessments == 'true' || github.event_name == 'schedule'
        run: |
          python -c "
          import asyncio
          import sys
          sys.path.insert(0, 'src/automation')
          from institutional_risk_ai_analyzer import InstitutionalRiskAIAnalyzer, update_country_with_ai_assessment

          async def update_all_countries():
              analyzer = InstitutionalRiskAIAnalyzer()

              # Countries to update
              countries = ['FR', 'BR', 'US', 'DE', 'GB', 'AU', 'KR', 'JP', 'SG', 'CH', 'AE', 'PT']

              for country in countries:
                  try:
                      assessment = await analyzer.generate_country_assessment(country)
                      if assessment:
                          await update_country_with_ai_assessment(country, assessment)
                          print(f'Updated {country}')
                  except Exception as e:
                      print(f'Error updating {country}: {e}')

          asyncio.run(update_all_countries())
          "

      - name: Summary
        run: |
          echo "Institutional risk data update completed"
          echo "Check Supabase for new pending incidents"
