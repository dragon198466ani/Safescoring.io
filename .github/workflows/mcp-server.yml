# SafeScoring MCP Server CI/CD
name: MCP Server

on:
  push:
    branches: [main]
    paths:
      - 'mcp-server/**'
  pull_request:
    branches: [main]
    paths:
      - 'mcp-server/**'

jobs:
  test:
    name: Test MCP Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mcp-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './mcp-server/package-lock.json'

      - name: Install dependencies
        run: npm install

      - name: Validate entry point
        env:
          SAFESCORING_API_KEY: sk_test_ci_validation
        run: node -e "import('./index.js').then(() => console.log('✅ MCP server loads OK')).catch(e => { console.error('❌', e.message); process.exit(1); })"

      - name: Run tests
        run: npm test
        continue-on-error: true

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ./mcp-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Check if version changed
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          PUBLISHED=$(npm view @safescoring/mcp-server version 2>/dev/null || echo "0.0.0")
          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
          if [ "$CURRENT" != "$PUBLISHED" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DOCKER_ENABLED == 'true'
    defaults:
      run:
        working-directory: ./mcp-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./mcp-server
          push: true
          tags: |
            safescoring/mcp-server:latest
            safescoring/mcp-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
