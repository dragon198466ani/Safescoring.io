name: Auto Update Compatibility

on:
  schedule:
    # Daily 3 AM UTC (was every 30min — too expensive for CI minutes)
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update-compat:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests

      - name: Process compatibility queue
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -c "
          import os
          import requests
          from datetime import datetime

          SUPABASE_URL = os.environ['SUPABASE_URL']
          headers = {
              'apikey': os.environ['SUPABASE_SERVICE_KEY'],
              'Authorization': f'Bearer {os.environ[\"SUPABASE_SERVICE_KEY\"]}',
              'Content-Type': 'application/json'
          }

          # Get pending products
          r = requests.get(
              f'{SUPABASE_URL}/rest/v1/compat_refresh_queue?select=product_id&processed_at=is.null&limit=50',
              headers=headers
          )

          if r.status_code != 200:
              print(f'Error fetching queue: {r.status_code}')
              exit(0)

          pending = list(set(p['product_id'] for p in r.json()))

          if not pending:
              print('No pending updates')
              exit(0)

          print(f'Found {len(pending)} products to process')

          # Mark as processed (the actual regeneration happens via generate_product_compat_safe)
          for pid in pending:
              requests.patch(
                  f'{SUPABASE_URL}/rest/v1/compat_refresh_queue?product_id=eq.{pid}&processed_at=is.null',
                  headers=headers,
                  json={'processed_at': datetime.now().isoformat()}
              )

          # Get affected pairs
          ids_str = ','.join(str(pid) for pid in pending)
          pairs = []

          r = requests.get(
              f'{SUPABASE_URL}/rest/v1/product_compatibility?select=product_a_id,product_b_id&product_a_id=in.({ids_str})',
              headers=headers
          )
          if r.status_code == 200:
              pairs.extend([(p['product_a_id'], p['product_b_id']) for p in r.json()])

          r = requests.get(
              f'{SUPABASE_URL}/rest/v1/product_compatibility?select=product_a_id,product_b_id&product_b_id=in.({ids_str})',
              headers=headers
          )
          if r.status_code == 200:
              pairs.extend([(p['product_a_id'], p['product_b_id']) for p in r.json()])

          pairs = list(set(pairs))
          print(f'Found {len(pairs)} pairs to flag for regeneration')

          # Flag pairs for regeneration by touching updated_at
          for pa_id, pb_id in pairs[:100]:  # Limit to 100 pairs per run
              a, b = min(pa_id, pb_id), max(pa_id, pb_id)
              requests.patch(
                  f'{SUPABASE_URL}/rest/v1/product_compatibility?product_a_id=eq.{a}&product_b_id=eq.{b}',
                  headers=headers,
                  json={'updated_at': datetime.now().isoformat()}
              )

          print(f'Done - {len(pending)} products processed, {min(len(pairs), 100)} pairs flagged')
          "
