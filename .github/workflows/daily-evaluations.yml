name: Daily Product Evaluations

# Quand ça tourne
on:
  schedule:
    - cron: '0 2 * * *'  # Tous les jours à 2h UTC
  workflow_dispatch:  # Permet de lancer manuellement depuis GitHub

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Max 1h, après ça s'arrête

    steps:
      # 1. Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Installer Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'  # Cache les dépendances = plus rapide

      # 3. Installer les dépendances
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Lancer les évaluations AVEC RETRY AUTOMATIQUE
      - name: Run evaluations (with retry)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 45
          max_attempts: 3          # Réessaie 3 fois si crash
          retry_wait_seconds: 120  # Attend 2 min entre chaque essai
          command: python run_parallel.py --workers 2 --limit 10
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      # 5. Log le résultat (même si échec)
      - name: Log completion
        if: always()
        run: |
          echo "Job finished at $(date)"
          echo "Status: ${{ job.status }}"
