# Automated Backup Workflow
# Runs daily to backup critical data to multiple locations

name: Backup

on:
  schedule:
    # Run every day at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  backup-code:
    name: Backup Code to Mirror
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history

      - name: Push to backup remote
        if: ${{ secrets.BACKUP_REPO_URL }}
        run: |
          git remote add backup ${{ secrets.BACKUP_REPO_URL }}
          git push backup --all --force
          git push backup --tags --force

  backup-database:
    name: Export Database Backup
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_DB_BACKUP == 'true' }}
    steps:
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Project
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Export Database
        run: |
          DATE=$(date +%Y%m%d)
          supabase db dump -f backup_${DATE}.sql

      - name: Encrypt Backup
        run: |
          gpg --batch --yes --symmetric --cipher-algo AES256 \
            --passphrase "${{ secrets.BACKUP_ENCRYPTION_KEY }}" \
            backup_*.sql

      - name: Upload to S3
        if: ${{ secrets.AWS_ACCESS_KEY_ID }}
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl private --follow-symlinks
        env:
          AWS_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SOURCE_DIR: '.'
          DEST_DIR: 'db-backups'

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        working-directory: ./web
        run: npm ci

      - name: Run npm audit
        working-directory: ./web
        run: |
          npm audit --audit-level=high || true
          npm audit --json > audit-report.json || true

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          extra_args: --only-verified

  notify-backup-status:
    name: Notify Backup Status
    runs-on: ubuntu-latest
    needs: [backup-code, backup-database, security-audit]
    if: always()
    steps:
      - name: Send notification
        if: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          STATUS="✅ Success"
          if [ "${{ needs.backup-code.result }}" != "success" ] || \
             [ "${{ needs.backup-database.result }}" != "success" ]; then
            STATUS="❌ Failed"
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="🔒 SafeScoring Backup Report

          📅 Date: $(date)
          📦 Code Backup: ${{ needs.backup-code.result }}
          🗄️ DB Backup: ${{ needs.backup-database.result }}
          🔍 Security Audit: ${{ needs.security-audit.result }}

          Status: $STATUS"
