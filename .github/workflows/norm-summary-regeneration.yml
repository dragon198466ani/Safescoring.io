name: Norm Summary Regeneration (Quality)

on:
  # schedule:                    # Disabled — free tier (2000 min/month)
  #   - cron: '0 4 * * 1'       # Was: weekly Monday 4 AM UTC
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of norms to process per run'
        required: false
        default: '50'
      force_all:
        description: 'Force regenerate all (true/false)'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: '3.11'

jobs:
  regenerate-summaries:
    runs-on: ubuntu-latest
    timeout-minutes: 55  # Stay under GitHub's 60min limit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 PyMuPDF pdfplumber

      - name: Create config directory
        run: mkdir -p config

      - name: Run Quality Regeneration
        env:
          API_CONFIG: ${{ secrets.API_CONFIG }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '50' }}
          FORCE_ALL: ${{ github.event.inputs.force_all || 'false' }}
        run: |
          python scripts/regen_cloud_simple.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regeneration-logs-${{ github.run_number }}
          path: |
            regen_*.log
            config/*.json
          retention-days: 7
