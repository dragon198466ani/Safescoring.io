name: Incident Scraper

on:
  schedule:
    # All sources: every 2 hours (removed 30-min Twitter schedule — too expensive for CI minutes)
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Source to scrape'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - defillama
          - slowmist
          - web3
          - rekt
          - rss
          - twitter
      skip_matching:
        description: 'Skip product matching'
        required: false
        default: false
        type: boolean
      twitter_only:
        description: 'Only run Twitter/Grok scraper'
        required: false
        default: false
        type: boolean

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

jobs:
  # Job 1: Primary sources (DefiLlama, SlowMist, etc.)
  scrape-primary:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.twitter_only != 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Run Incident Scraper
        run: |
          cd src/automation
          SOURCE="${{ github.event.inputs.source || 'all' }}"

          # Skip twitter in primary job (handled separately)
          if [ "$SOURCE" = "twitter" ]; then
            echo "Twitter handled in separate job"
            exit 0
          fi

          SKIP_MATCH=""
          if [ "${{ github.event.inputs.skip_matching }}" = "true" ]; then
            SKIP_MATCH="--no-match"
          fi

          python incident_scraper.py --source $SOURCE $SKIP_MATCH

      - name: Report results
        if: always()
        run: |
          echo "Primary incident scraping completed at $(date)"

  # Job 2: Twitter/X scraper with Grok AI analysis (REAL-TIME)
  scrape-twitter:
    runs-on: ubuntu-latest
    # Run every 30 minutes for real-time incident detection
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '*/30 * * * *') ||
      github.event.inputs.source == 'twitter' ||
      github.event.inputs.twitter_only == 'true' ||
      github.event.inputs.source == 'all'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Check OpenRouter API Key
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::warning::OPENROUTER_API_KEY not set - Twitter/Grok scraping will be limited"
          else
            echo "OpenRouter API key configured"
          fi

      - name: Run Twitter Crypto Scraper
        run: |
          cd src/automation
          python twitter_crypto_scraper.py --batch-size 10

      - name: Report results
        if: always()
        run: |
          echo "Twitter/Grok incident scraping completed at $(date)"
          echo "Monitored accounts: @zachxbt, @PeckShieldAlert, @CertiKAlert, @SlowMist_Team"

  # Job 3: Match incidents to products
  match-products:
    runs-on: ubuntu-latest
    needs: [scrape-primary, scrape-twitter]
    if: |
      always() &&
      (needs.scrape-primary.result == 'success' || needs.scrape-twitter.result == 'success') &&
      github.event.inputs.skip_matching != 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Match incidents to products
        run: |
          cd src/automation
          python -c "
          from incident_scraper import match_incidents_to_products
          match_incidents_to_products(use_fuzzy=True)
          "

      - name: Report completion
        run: |
          echo "Incident-product matching completed at $(date)"

  # Job 4: Send real-time alerts (COMPETITIVE ADVANTAGE)
  send-alerts:
    runs-on: ubuntu-latest
    needs: [match-products]
    if: always() && needs.match-products.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Send incident alerts
        run: |
          cd src/automation
          python incident_alerter.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Report alerts sent
        run: |
          echo "Real-time alerts dispatched at $(date)"
          echo "Channels: Telegram, Discord, Email"
