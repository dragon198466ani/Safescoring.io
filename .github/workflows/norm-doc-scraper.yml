name: Norm Documentation Scraper

# Weekly + manual (was every 6h but 350min timeout × 4 runs = ~1400 min/day, blowing through free tier)
on:
  schedule:
    - cron: '0 3 * * 0'  # Weekly Sunday 3 AM UTC
  workflow_dispatch:  # Permet de lancer manuellement

jobs:
  scrape-norms:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # Max 5h50 (GitHub limite à 6h)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Norm Doc Scraper
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 330  # 5h30 max par tentative
          max_attempts: 2
          retry_wait_seconds: 60
          command: |
            python -c "
            from src.automation.norm_doc_scraper import NormDocScraper
            scraper = NormDocScraper()
            scraper.run_parallel(workers=5, skip_existing=True)
            "
        env:
          # Supabase
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

          # Groq (15 keys)
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
          GROQ_API_KEY_5: ${{ secrets.GROQ_API_KEY_5 }}
          GROQ_API_KEY_6: ${{ secrets.GROQ_API_KEY_6 }}
          GROQ_API_KEY_7: ${{ secrets.GROQ_API_KEY_7 }}
          GROQ_API_KEY_8: ${{ secrets.GROQ_API_KEY_8 }}
          GROQ_API_KEY_9: ${{ secrets.GROQ_API_KEY_9 }}
          GROQ_API_KEY_10: ${{ secrets.GROQ_API_KEY_10 }}
          GROQ_API_KEY_11: ${{ secrets.GROQ_API_KEY_11 }}
          GROQ_API_KEY_12: ${{ secrets.GROQ_API_KEY_12 }}
          GROQ_API_KEY_13: ${{ secrets.GROQ_API_KEY_13 }}
          GROQ_API_KEY_14: ${{ secrets.GROQ_API_KEY_14 }}
          GROQ_API_KEY_15: ${{ secrets.GROQ_API_KEY_15 }}

          # SambaNova (24 keys)
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          SAMBANOVA_API_KEY_2: ${{ secrets.SAMBANOVA_API_KEY_2 }}
          SAMBANOVA_API_KEY_3: ${{ secrets.SAMBANOVA_API_KEY_3 }}
          SAMBANOVA_API_KEY_4: ${{ secrets.SAMBANOVA_API_KEY_4 }}
          SAMBANOVA_API_KEY_5: ${{ secrets.SAMBANOVA_API_KEY_5 }}
          SAMBANOVA_API_KEY_6: ${{ secrets.SAMBANOVA_API_KEY_6 }}
          SAMBANOVA_API_KEY_7: ${{ secrets.SAMBANOVA_API_KEY_7 }}
          SAMBANOVA_API_KEY_8: ${{ secrets.SAMBANOVA_API_KEY_8 }}
          SAMBANOVA_API_KEY_9: ${{ secrets.SAMBANOVA_API_KEY_9 }}
          SAMBANOVA_API_KEY_10: ${{ secrets.SAMBANOVA_API_KEY_10 }}
          SAMBANOVA_API_KEY_11: ${{ secrets.SAMBANOVA_API_KEY_11 }}
          SAMBANOVA_API_KEY_12: ${{ secrets.SAMBANOVA_API_KEY_12 }}
          SAMBANOVA_API_KEY_13: ${{ secrets.SAMBANOVA_API_KEY_13 }}
          SAMBANOVA_API_KEY_14: ${{ secrets.SAMBANOVA_API_KEY_14 }}
          SAMBANOVA_API_KEY_15: ${{ secrets.SAMBANOVA_API_KEY_15 }}
          SAMBANOVA_API_KEY_16: ${{ secrets.SAMBANOVA_API_KEY_16 }}
          SAMBANOVA_API_KEY_17: ${{ secrets.SAMBANOVA_API_KEY_17 }}
          SAMBANOVA_API_KEY_18: ${{ secrets.SAMBANOVA_API_KEY_18 }}
          SAMBANOVA_API_KEY_19: ${{ secrets.SAMBANOVA_API_KEY_19 }}
          SAMBANOVA_API_KEY_20: ${{ secrets.SAMBANOVA_API_KEY_20 }}
          SAMBANOVA_API_KEY_21: ${{ secrets.SAMBANOVA_API_KEY_21 }}
          SAMBANOVA_API_KEY_22: ${{ secrets.SAMBANOVA_API_KEY_22 }}
          SAMBANOVA_API_KEY_23: ${{ secrets.SAMBANOVA_API_KEY_23 }}
          SAMBANOVA_API_KEY_24: ${{ secrets.SAMBANOVA_API_KEY_24 }}

          # Cerebras (4 keys)
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          CEREBRAS_API_KEY_2: ${{ secrets.CEREBRAS_API_KEY_2 }}
          CEREBRAS_API_KEY_3: ${{ secrets.CEREBRAS_API_KEY_3 }}
          CEREBRAS_API_KEY_4: ${{ secrets.CEREBRAS_API_KEY_4 }}

      - name: Check progress
        if: always()
        run: |
          python -c "
          import requests
          import os
          url = os.environ.get('SUPABASE_URL')
          key = os.environ.get('SUPABASE_KEY')
          if url and key:
              headers = {'apikey': key, 'Authorization': f'Bearer {key}', 'Prefer': 'count=exact'}
              r = requests.get(f'{url}/rest/v1/norms?select=code&official_doc_summary=not.is.null', headers=headers)
              count = r.headers.get('content-range', '0-0/0').split('/')[-1]
              print(f'Norms with summaries: {count}/1302')
          "
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Log completion
        if: always()
        run: |
          echo "Job finished at $(date)"
          echo "Status: ${{ job.status }}"
